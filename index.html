<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Klar &amp; Kunter – Kreative Workshops für Frauen</title>

<style>
:root{
--bg:#f6f1e8;
--ink:#1f261a;
--muted:#5f655b;
--line:rgba(31,38,26,0.14);
--max:1180px;
--serif:Georgia,"Times New Roman",serif;
--sans:-apple-system,BlinkMacSystemFont,"Helvetica Neue",Arial,sans-serif;
}

*{box-sizing:border-box;}

body{
margin:0;
font-family:var(--sans);
background:var(--bg);
color:var(--ink);
}

h1,h2,h3{
font-family:var(--serif);
font-weight:400;
letter-spacing:-0.03em;
}

.container{
max-width:var(--max);
margin:0 auto;
padding:40px 20px;
position:relative;
z-index:2;
}

/* HERO */

.hero{
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
background:
linear-gradient(rgba(0,0,0,0.25), rgba(0,0,0,0.3)),
url("https://raw.githubusercontent.com/KlarundKunter/KlarundKunter/main/KuK%20Bilder/KK%2018.jpg") center/cover no-repeat;
color:white;
position:relative;
overflow:hidden;
}

.hero h1{
font-size:64px;
max-width:10ch;
margin:0 auto;
}

.hero p{
max-width:600px;
margin:20px auto 0;
font-size:20px;
}

/* ICONS */

.decor{
position:absolute;
inset:0;
pointer-events:none;
z-index:1;
}

/* ICON STYLE (hand drawn look) */
.decor svg{
position:absolute;
stroke:#2e3728;
stroke-width:1.4;
fill:none;
opacity:0.9;
}

/* positions */

.icon1{top:40px;left:40px;width:220px;}
.icon2{top:80px;right:60px;width:200px;}
.icon3{bottom:60px;left:50px;width:240px;}
.icon4{bottom:40px;right:80px;width:260px;}
.icon5{top:140px;left:50%;transform:translateX(-50%);width:50px;}

/* SECTION */

.section{
padding:120px 20px;
}

.section h2{
font-size:42px;
max-width:12ch;
margin-bottom:20px;
}

.section p{
max-width:600px;
color:var(--muted);
}

/* MOBILE */

@media(max-width:768px){
.hero h1{font-size:40px;}
.decor svg{opacity:0.35;}
}

</style>
</head>

<body>

<div class="hero">

<!-- ICONS -->
<div class="decor">

<!-- brush -->
<svg class="icon1" viewBox="0 0 200 120">
<path d="M10 90 C60 70, 100 60, 150 30"/>
<path d="M150 30 L170 10"/>
<path d="M160 20 L180 5"/>
</svg>

<!-- palette -->
<svg class="icon2" viewBox="0 0 200 200">
<path d="M100 20 C150 20 180 60 180 100 C180 140 150 180 100 180 C60 180 20 140 20 100 C20 60 50 20 100 20 Z"/>
<circle cx="70" cy="80" r="6"/>
<circle cx="110" cy="70" r="6"/>
<circle cx="130" cy="110" r="6"/>
<circle cx="90" cy="130" r="6"/>
</svg>

<!-- scissors -->
<svg class="icon3" viewBox="0 0 200 150">
<circle cx="50" cy="100" r="20"/>
<circle cx="90" cy="120" r="20"/>
<path d="M60 90 L150 20"/>
<path d="M80 130 L160 40"/>
</svg>

<!-- pencil -->
<svg class="icon4" viewBox="0 0 200 150">
<path d="M20 120 L160 20"/>
<path d="M150 30 L170 10"/>
<path d="M30 110 L50 130"/>
</svg>

<!-- center symbol -->
<svg class="icon5" viewBox="0 0 60 60">
<circle cx="30" cy="30" r="18"/>
<circle cx="30" cy="30" r="4"/>
</svg>

</div>

<div class="container">
<h1>Lade Deine Kreativität auf</h1>
<p>Kreative Auszeiten für Frauen, die mit den Händen gestalten und etwas Echtes schaffen möchten.</p>
</div>

</div>

<section class="section">
<div class="container">
<h2>Kreativität kennt kein Alter</h2>
<p>Klar &amp; Kunter ist für Frauen, die wieder etwas mit den Händen machen möchten. Ohne Druck. Ohne Bewertung. Mit echter Freude am Gestalten.</p>
</div>
</section>

</body>
</html>
